<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css"> <!-- CSS Link -->
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon"> <!-- Logo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous"> <!-- Bootstrap -->

    <title>Random Emoji Generator</title>
</head>
<body>
    <main class="mx-auto">
        <h1 class="text-center p-4 rounded-3 fw-bold">🎲 Random Emoji Generator</h1>
        <section class="cards bg-white rounded-3 p-5">            
            <select id="categorySelect" class="d-block w-100 py-3 px-2 rounded-3 mb-3">
                <option value="">Loading categories...</option>
            </select>
            <section id="emojiDisplay" class="mb-3 text-center fs-1">🤔</section>
            <button id="generateBtn" class="w-100 rounded-3 border-0 text-white py-3">Generate Emoji</button>            
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
